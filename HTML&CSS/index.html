<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <title>Document</title>
</head>
<body>
     <header>
     <div class="Nav-bar-master" >
         <nav class="nav-bar-top">
             <div class="logo">
                 <i class="fa-solid fa-bag-shopping"></i>
                       <button class="logo-btn-name"> Flipkart</button>
             </div>

             <div class="travel">
                 <button class="logo-btn-name">✈️ Travel</button>
             </div>
             <div class="nav-top-right-location">
                 <i class="fa-solid fa-location-dot" style="color: rgb(255, 255, 255);"></i>

             </div>
         </nav>

                     <input class="search-bar" type="text" placeholder="Search for products, brands and more">
                 </label>
             </div>
             <div class="auth-button">
                  <label >

                      <select class="auth-button" >
                          <option value="Login">Login</option>
                          <option value="Log Out ">Log out</option>
                      </select>

                  </label>
             </div>

             <div class="menu-icon">

             </div>
             <div class="cart">
                 <i class="fa-solid fa-cart-shopping" style="font-size: 40px" ></i>
             </div>

         </nav>
         <nav class="nav-bar-bottom">
             <ul class="nav-bar-bottom">
                 <li><i class="fa-solid fa-box"></i> <a href="#">For You</a> </li>
                 <li><i class="fa-solid fa-shirt"></i> <a href="#">Fashion</a></li>
                 <li><i class="fa-solid fa-mobile"></i><a href="#">Mobiles</a></li>
                 <li><i class="fa-solid fa-wand-magic-sparkles"></i><a href="#">Beauty</a></li>
                 <li><i class="fa-solid fa-laptop"></i><a href="#">Electronics</a></li>
                 <li><i class="fa-solid fa-basket-shopping"></i><a href="#">Groceries</a></li>
                 <li><i class="fa-solid fa-fan"></i><a href="#">Appliances</a></li>
                 <li><i class="fa-solid fa-couch"></i><a href="#">Furniture</a></li>
                 <li><i class="fa-solid fa-book"></i><a href="#">Books</a></li>
                 <li><i class="fa-solid fa-gamepad"></i><a href="#">Sports</a></li>
             </ul>
         </nav>

     <div class="hero">

     </div>

      <footer>

      </footer>
