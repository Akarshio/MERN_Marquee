<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="style.css">
    <title>Form</title>
</head>
<body>
       <div id="app">
               <h2>Sports Physical Form</h2>
               <div>
                   <form action="">
                       <fieldset class="form-group">
                           <legend>Player Name</legend>
                           <label class="form-label">
                               <input type="text" placeholder="Enter your name" required class="input-text">
                           </label>

                       </fieldset>
                       <fieldset class="form-group">
                           <legend>Player Address</legend>
                           <label class="form-label">
                               <input type="text" placeholder="Enter your address" required class="input-text">
                           </label>
                       </fieldset>
                       <fieldset class="form-group">
                           <legend>Player Number</legend>
                           <label class="form-label" >
                               <input type="tel" placeholder="Enter your phone number" required class="input-text" maxlength="10">
                           </label>
                       </fieldset>
                       <div>
                           <button class="btn-sub" >Submit</button>
                       </div>
                   </form>
               </div>

               <div></div>

       </div>
</body>
</html>
